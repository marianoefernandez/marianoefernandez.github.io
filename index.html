<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="index.css"/>
</head>
<body>

<div class="calc-wrap">
  <div class="calc-label">CALC — MK1</div>
  <div class="calculator">
    <div class="screw-bl"></div>
    <div class="screw-br"></div>

    <div class="display">
      <div class="display-expr" id="expr"></div>
      <div class="display-result" id="result">0</div>
    </div>

    <div class="buttons">
      <!-- Row 1 -->
      <button class="fn clear" data-action="clear">AC</button>
      <button class="fn" data-action="sign">+/−</button>
      <button class="fn" data-action="percent">%</button>
      <button class="op" data-action="op" data-val="/">÷</button>

      <!-- Row 2 -->
      <button data-action="num" data-val="7">7</button>
      <button data-action="num" data-val="8">8</button>
      <button data-action="num" data-val="9">9</button>
      <button class="op" data-action="op" data-val="*">×</button>

      <!-- Row 3 -->
      <button data-action="num" data-val="4">4</button>
      <button data-action="num" data-val="5">5</button>
      <button data-action="num" data-val="6">6</button>
      <button class="op" data-action="op" data-val="-">−</button>

      <!-- Row 4 -->
      <button data-action="num" data-val="1">1</button>
      <button data-action="num" data-val="2">2</button>
      <button data-action="num" data-val="3">3</button>
      <button class="op" data-action="op" data-val="+">+</button>

      <!-- Row 5 -->
      <button class="zero" data-action="num" data-val="0">0</button>
      <button data-action="decimal">.</button>
      <button class="equals" data-action="equals">=</button>
    </div>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
